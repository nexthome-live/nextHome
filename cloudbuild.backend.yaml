# NOTE: Keep this file in sync with cloudbuild.yaml.
steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_APP_SERVICE}:$SHORT_SHA
      - /workspace/backend/nexthome-app

  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_APP_SERVICE}:$SHORT_SHA

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail

        if [[ "${_DB_URL}" == "invalid://must-set-db-url" ]]; then
          echo "ERROR: _DB_URL must be overridden with a valid database URL." >&2
          exit 1
        fi

        APP_IMAGE="${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_APP_SERVICE}:$SHORT_SHA"

        gcloud run deploy "${_APP_SERVICE}" \
          --image "$$APP_IMAGE" \
          --region "${_REGION}" \
          --platform managed \
          --allow-unauthenticated \
          --port 8080 \
          --set-env-vars "^|^SERVER_PORT=8080|DB_URL=${_DB_URL}|DB_USERNAME=${_DB_USERNAME}|DB_PASSWORD=${_DB_PASSWORD}|CORS_ALLOWED_ORIGINS=${_CORS_ALLOWED_ORIGINS}"

substitutions:
  _REGION: us-central1
  _REPOSITORY: nexthome-backend
  _APP_SERVICE: nexthome-app
  # Must be overridden during deployment (workflow variable: DB_URL).
  # Expected format: jdbc:mysql://<host>:<port>/<database>
  _DB_URL: invalid://must-set-db-url
  _DB_USERNAME: avnadmin
  _DB_PASSWORD: AVNS_gnhYrsECOIB0hcmdylj
  _CORS_ALLOWED_ORIGINS: http://localhost:5173,http://localhost:4173,https://nexthome-live.github.io

options:
  logging: CLOUD_LOGGING_ONLY
