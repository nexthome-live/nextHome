name: Deploy Backend to Cloud Run

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - backend/**
      - cloudbuild.backend.yaml
      - .github/workflows/deploy-backend-cloud-run.yml

permissions:
  contents: read
  id-token: write

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}

      - name: Submit backend deployment build
        run: |
          gcloud builds submit \
            --config=cloudbuild.backend.yaml \
            --substitutions=_REGION=${{ vars.GCP_REGION }},_REPOSITORY=${{ vars.GCP_ARTIFACT_REPOSITORY }},_VACANCY_SERVICE=${{ vars.VACANCY_SERVICE_NAME }},_SEARCH_SERVICE=${{ vars.SEARCH_SERVICE_NAME }},_GATEWAY_SERVICE=${{ vars.GATEWAY_SERVICE_NAME }},_DB_URL=${{ vars.DB_URL }},_DB_USERNAME_SECRET=${{ vars.DB_USERNAME_SECRET_NAME }},_DB_PASSWORD_SECRET=${{ vars.DB_PASSWORD_SECRET_NAME }},_CORS_ALLOWED_ORIGINS=${{ vars.CORS_ALLOWED_ORIGINS }}
