name: Deploy Backend to Cloud Run

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - backend/**
      - cloudbuild.backend.yaml
      - .github/workflows/deploy-backend-cloud-run.yml

permissions:
  contents: read
  id-token: write

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}

      - name: Submit backend deployment build
        run: |
          REGION="${{ vars.GCP_REGION }}"
          REPOSITORY="${{ vars.GCP_ARTIFACT_REPOSITORY }}"
          APP_SERVICE="${{ vars.APP_SERVICE_NAME }}"
          RUNTIME_SERVICE_ACCOUNT="${{ vars.RUNTIME_SERVICE_ACCOUNT }}"
          DB_URL="${{ vars.DB_URL }}"
          DB_USERNAME_SECRET="${{ vars.DB_USERNAME_SECRET_NAME }}"
          DB_PASSWORD_SECRET="${{ vars.DB_PASSWORD_SECRET_NAME }}"
          CORS_ALLOWED_ORIGINS="${{ vars.CORS_ALLOWED_ORIGINS }}"
          if [[ -z "${CORS_ALLOWED_ORIGINS}" ]]; then
            CORS_ALLOWED_ORIGINS="http://localhost:5173,http://localhost:4173,https://nexthome-live.github.io"
          fi
          if [[ -z "${RUNTIME_SERVICE_ACCOUNT}" ]]; then
            RUNTIME_SERVICE_ACCOUNT="${{ secrets.GCP_SERVICE_ACCOUNT }}"
          fi

          subs=(
            "_REGION=${REGION}"
            "_REPOSITORY=${REPOSITORY}"
            "_APP_SERVICE=${APP_SERVICE}"
            "_RUNTIME_SERVICE_ACCOUNT=${RUNTIME_SERVICE_ACCOUNT}"
            "_DB_URL=${DB_URL}"
            "_DB_USERNAME_SECRET=${DB_USERNAME_SECRET}"
            "_DB_PASSWORD_SECRET=${DB_PASSWORD_SECRET}"
            "_CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}"
          )
          SUBSTITUTIONS=$(IFS=,; echo "${subs[*]}")

          gcloud builds submit \
            --config=cloudbuild.backend.yaml \
            --substitutions="$SUBSTITUTIONS"
