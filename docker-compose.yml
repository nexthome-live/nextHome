services:
  mysql:
    image: mysql:8.4
    container_name: nexthome-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: vacancy_db
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -proot || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  nexthome-app:
    build: ./backend/nexthome-app
    environment:
      DB_URL: jdbc:mysql://mysql:3306/vacancy_db
      DB_USERNAME: root
      DB_PASSWORD: root
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8080:8080"
