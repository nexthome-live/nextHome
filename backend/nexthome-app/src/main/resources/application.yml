spring:
  application:
    name: nexthome-app
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/vacancy_db}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false

server:
  port: ${PORT:8080}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:4173,https://nexthome-live.github.io}
  allowed-methods: ${CORS_ALLOWED_METHODS:GET,POST,PUT,DELETE,OPTIONS}
  allowed-headers: ${CORS_ALLOWED_HEADERS:Content-Type,Accept,Authorization,X-Management-Token}

management:
  endpoints:
    web:
      exposure:
        include: health,info
